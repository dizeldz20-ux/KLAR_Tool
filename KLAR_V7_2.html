                                                <polyline points="20 6 9 17 4 12"/>
                                            </svg>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        }

        function SnippetInsertButton({ onInsert, showToast }) {
            const [open, setOpen] = React.useState(false);
            const [search, setSearch] = React.useState('');
            const ref = React.useRef(null);
            const SNIPPETS_KEY = 'klar_snippets';
            const GLOBAL_SNIPPETS_KEY = 'klar_global_snippets';
            const allSnippets = React.useMemo(() => {
                let personal = [], global = [];
                try { personal = JSON.parse(localStorage.getItem(SNIPPETS_KEY) || '[]'); } catch {}
                try { global = JSON.parse(localStorage.getItem(GLOBAL_SNIPPETS_KEY) || '[]'); } catch {}
                return [...global.map(s => ({...s, isGlobal: true})), ...personal.map(s => ({...s, isGlobal: false}))];
            }, [open]);
            const filtered = allSnippets.filter(s => !search || s.title?.includes(search) || s.text?.includes(search));
            React.useEffect(() => {
                if (!open) return;
                const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
                document.addEventListener('mousedown', handler);
                return () => document.removeEventListener('mousedown', handler);
            }, [open]);
            return (
                <div className="absolute bottom-2 left-16 z-20" ref={ref}>
                    <button type="button" onClick={() => { setOpen(p => !p); setSearch(''); }}
                        className={`flex items-center gap-1 px-2 py-1.5 rounded-full text-[11px] font-bold transition-all ${open ? 'bg-amber-500 text-white shadow-lg' : 'bg-amber-100/80 hover:bg-amber-200 text-amber-700 hover:shadow-md'}`}
                        title="הכנס תבנית טקסט מהירה">
                        📝 <span>תבנית</span>
                    </button>
                    {open && (
                        <div className="absolute bottom-full left-0 mb-2 w-72 bg-white rounded-xl shadow-2xl border-2 border-amber-300 overflow-hidden" style={{direction:'rtl', maxHeight:'280px'}}>
                            <div className="bg-amber-50 px-3 py-2 border-b border-amber-200">
                                <input type="text" value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍 חפש תבנית..." className="w-full border border-amber-200 rounded-lg px-2 py-1 text-xs outline-none focus:ring-1 focus:ring-amber-400" autoFocus />
                            </div>
                            <div className="overflow-y-auto" style={{maxHeight:'220px'}}>
                                {filtered.length === 0 ? (
                                    <div className="p-4 text-center text-gray-400 text-xs">
                                        <p className="text-lg mb-1">📝</p>
                                        <p>{allSnippets.length === 0 ? 'אין תבניות — הוסף דרך הדאשבורד' : 'לא נמצאו תוצאות'}</p>
                                    </div>
                                ) : filtered.map(s => (
                                    <button key={s.id} type="button" onClick={() => { onInsert(s.text); setOpen(false); showToast && showToast('📝 תבנית הוכנסה!'); }}
                                        className="w-full text-right px-3 py-2 hover:bg-amber-50 border-b border-gray-100 last:border-0 transition-colors group">
                                        <div className="flex items-center gap-1.5">
                                            <span className="text-[10px]">{s.isGlobal ? '🌍' : '👤'}</span>
                                            <span className="font-bold text-xs text-gray-800 truncate">{s.title}</span>
                                        </div>
                                        <p className="text-[10px] text-gray-400 truncate mt-0.5">{s.text?.substring(0, 60)}</p>
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // === CUSTOM FORMATS HELPERS ===
        const getCustomFormats = () => { try { return JSON.parse(localStorage.getItem('klar_custom_formats') || '[]'); } catch { return []; } };
        const saveCustomFormats = (fmts) => localStorage.setItem('klar_custom_formats', JSON.stringify(fmts));

        // ============================================================
        // 🗄️ IKEA PRICE CACHE — Global helpers (accessible by all components)
        // ============================================================
        const CACHE_TTL_MS = 24 * 60 * 60 * 1000; // 24 hours

        const getCachedProduct = (makat) => {
            try {
                const cache = JSON.parse(localStorage.getItem('klar_ikea_cache') || '{}');
                const entry = cache[makat];
                if (!entry) return null;
                if (Date.now() - entry.fetchedAt > CACHE_TTL_MS) return null;
                return entry;
            } catch { return null; }
        };

        const setCachedProduct = (makat, data) => {
            try {
                const cache = JSON.parse(localStorage.getItem('klar_ikea_cache') || '{}');
                cache[makat] = { ...data, fetchedAt: Date.now() };
                const keys = Object.keys(cache);
                if (keys.length > 500) {
                    const sorted = keys.sort((a, b) => (cache[a].fetchedAt||0) - (cache[b].fetchedAt||0));
                    sorted.slice(0, 50).forEach(k => delete cache[k]);
                }
                localStorage.setItem('klar_ikea_cache', JSON.stringify(cache));
            } catch {}
        };

        const clearIkeaCache = (toastFn) => {
            localStorage.removeItem('klar_ikea_cache');
            if (toastFn) toastFn('🗑️ Cache מחירי איקאה נוקה');
        };

        const getIkeaCacheStats = () => {
            try {
                const cache = JSON.parse(localStorage.getItem('klar_ikea_cache') || '{}');
                const keys = Object.keys(cache);
                const valid = keys.filter(k => Date.now() - (cache[k].fetchedAt||0) < CACHE_TTL_MS);
                return { total: keys.length, valid: valid.length };
            } catch { return { total: 0, valid: 0 }; }
        };

        const getIkeaProxyUrl = () => {
            try {
                const ints = JSON.parse(localStorage.getItem('klar_integrations') || '{}');
                return (ints.ikea_proxy && ints.ikea_proxy.fields && ints.ikea_proxy.fields.proxyUrl) || '';
            } catch { return ''; }
        };

        const buildProxiedUrl = (targetUrl) => {
            const proxy = getIkeaProxyUrl();
            if (!proxy) return targetUrl;
            return proxy.replace(/\/$/, '') + '?url=' + encodeURIComponent(targetUrl);
        };

        const fetchIkeaProduct = async (makat, forceRefresh = false) => {
            const raw = makat.replace(/\D/g, '');
            const digits = raw.padStart(8, '0');
            const short = raw.replace(/^0+/, '');

            if (!forceRefresh) {
                const cached = getCachedProduct(digits);
                if (cached && cached.found !== undefined) {
                    return { name: cached.name, price: cached.price, found: cached.found, fromCache: true };
                }
            }

            // --- Strategy 1: SIK Search API via allorigins (BEST — works for IL) ---
            try {
                const sikUrl = `https://sik.search.blue.cdtapps.com/il/he/search-result-page?q=${digits}&types=PRODUCT&size=5`;
                const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(sikUrl);
                const adminProxy = getIkeaProxyUrl();
                const fetchUrl = adminProxy ? (adminProxy.replace(/\/$/, '') + '?url=' + encodeURIComponent(sikUrl)) : proxyUrl;
                const r = await fetch(fetchUrl, { signal: AbortSignal.timeout(12000) });
                if (r.ok) {
                    const d = await r.json();
                    const items = d?.searchResultPage?.products?.main?.items || [];
                    const match = items.find(i => {
                        const id = String(i?.product?.itemNo || i?.product?.id || '').replace(/\D/g, '');
                        return id === raw || id === digits || id === short || id.endsWith(short);
                    }) || (items.length > 0 ? items[0] : null);
                    if (match?.product) {
                        const p = match.product;
                        const name = [p.name, p.typeName].filter(Boolean).join(' — ');
                        const price = parseFloat(p.salesPrice?.numeral || 0);
                        if (name || price > 0) {
                            const result = { name, price, found: true };
                            setCachedProduct(digits, result);
                            return result;
                        }
                    }
                }
            } catch (_) { console.warn('SIK API fetch failed', _); }

            // --- Strategy 2: Try with short number (without leading zeros) ---
            if (short !== digits) {
                try {
                    const sikUrl2 = `https://sik.search.blue.cdtapps.com/il/he/search-result-page?q=${short}&types=PRODUCT&size=5`;
                    const proxyUrl2 = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(sikUrl2);
                    const adminProxy = getIkeaProxyUrl();
                    const fetchUrl2 = adminProxy ? (adminProxy.replace(/\/$/, '') + '?url=' + encodeURIComponent(sikUrl2)) : proxyUrl2;
                    const r2 = await fetch(fetchUrl2, { signal: AbortSignal.timeout(12000) });
                    if (r2.ok) {
                        const d2 = await r2.json();
                        const items2 = d2?.searchResultPage?.products?.main?.items || [];
                        if (items2.length > 0 && items2[0]?.product) {
                            const p = items2[0].product;
                            const name = [p.name, p.typeName].filter(Boolean).join(' — ');
                            const price = parseFloat(p.salesPrice?.numeral || 0);
                            if (name || price > 0) {
                                const result = { name, price, found: true };
                                setCachedProduct(digits, result);
                                return result;
                            }
                        }
                    }
                } catch (_) { console.warn('SIK short fallback failed', _); }
            }

            // --- Strategy 3: Fallback — INGKA availability API (for price only) ---
            try {
                const ingkaUrl = 'https://api.ingka.ikea.com/cia/availabilities/ru/il?itemNos=' + digits + '&expand=StoresList,Restocks';
                const proxyUrl3 = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(ingkaUrl);
                const r3 = await fetch(proxyUrl3, { signal: AbortSignal.timeout(8000), headers: { Accept: 'application/json' } });
                if (r3.ok) {
                    const d3 = await r3.json();
                    if (d3?.availabilities?.length > 0) {
                        // Product exists in IKEA system even if no price from this API
                        const result = { name: 'פריט ' + raw + ' (אומת IKEA)', price: 0, found: true };
                        setCachedProduct(digits, result);
                        return result;
                    }
                }
            } catch (_) {}

            const notFound = { name: 'מק"ט ' + raw, price: 0, found: false };
            try {
                const cache = JSON.parse(localStorage.getItem('klar_ikea_cache') || '{}');
                cache[digits] = { ...notFound, fetchedAt: Date.now() - (20 * 60 * 60 * 1000) };
                localStorage.setItem('klar_ikea_cache', JSON.stringify(cache));
            } catch {}
            return notFound;
        };

        // ============================================================
        // 📋 INQUIRY HISTORY — Global helpers
        // ============================================================
        const HISTORY_KEY = 'klar_inquiry_history';
        const MAX_HISTORY = 200;

        const getHistory = () => {
            try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; }
        };

        const saveToHistory = (entry) => {
            try {
                const hist = getHistory();
                const newEntry = {
                    id: Date.now(),
                    savedAt: new Date().toISOString(),
                    ...entry
                };
                hist.unshift(newEntry); // newest first
                if (hist.length > MAX_HISTORY) hist.splice(MAX_HISTORY);
                localStorage.setItem(HISTORY_KEY, JSON.stringify(hist));
                return newEntry.id;
            } catch { return null; }
        };

        const deleteHistoryEntry = (id) => {
            try {
                const hist = getHistory().filter(e => e.id !== id);
                localStorage.setItem(HISTORY_KEY, JSON.stringify(hist));
            } catch {}
        };

        const clearHistory = () => {
            localStorage.removeItem(HISTORY_KEY);
        };

        const searchHistory = (query, tabFilter = '') => {
            const hist = getHistory();
            const q = query.toLowerCase().trim();
            return hist.filter(e => {
                const matchTab = !tabFilter || e.tab === tabFilter;
                if (!q) return matchTab;
                const searchable = [
                    e.pniya, e.customerName, e.phone, e.tab,
                    e.branch, e.agent, e.summary
                ].filter(Boolean).join(' ').toLowerCase();
                return matchTab && searchable.includes(q);
            });
        };

        function App() {
            // === THEME STATE ===
            const [themeMode, setThemeMode] = useState(() => {
                try { return localStorage.getItem('klar_theme') || 'system'; } catch { return 'system'; }
            });
            
            // Apply theme to document
            useEffect(() => {
                const applyTheme = (mode) => {
                    let effectiveTheme = mode;
                    if (mode === 'system') {
                        effectiveTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                    }
                    document.documentElement.setAttribute('data-theme', effectiveTheme);
                };
                applyTheme(themeMode);
                try { localStorage.setItem('klar_theme', themeMode); } catch {}
                
                // Listen for system theme changes
                if (themeMode === 'system') {
                    const mq = window.matchMedia('(prefers-color-scheme: dark)');
                    const handler = () => applyTheme('system');
                    mq.addEventListener('change', handler);
                    return () => mq.removeEventListener('change', handler);
                }
            }, [themeMode]);
            
            const cycleTheme = () => {
                setThemeMode(prev => prev === 'light' ? 'dark' : prev === 'dark' ? 'system' : 'light');
            };
            
            const ThemeToggle = () => (
                <div className="theme-toggle" data-mode={themeMode} onClick={cycleTheme} title={themeMode === 'light' ? 'מצב בהיר' : themeMode === 'dark' ? 'מצב כהה' : 'מצב מערכת'}>
                    <div className="toggle-track"></div>
                    <div className="toggle-thumb">
                        {themeMode === 'light' ? '☀️' : themeMode === 'dark' ? '🌙' : '⚙️'}
                    </div>
                </div>
            );

            // === AUTH STATE ===
            const [currentUser, setCurrentUser] = useState(null);
            const [systemLocked, setSystemLocked] = useState(isSystemLocked());
            const [unlockCode, setUnlockCode] = useState('');
            const [showAdminPanel, setShowAdminPanel] = useState(false);
            const [branchReferents, setBranchReferents] = useState(getBranchReferents());
            const [formatEmails, setFormatEmails] = useState(getFormatEmails());
            const [formatCcEmails, setFormatCcEmails] = useState(getFormatCcEmails());
            const [showSessionHistory, setShowSessionHistory] = useState(false);
            
            // AGENT 11: Session activity log (in-memory, resets on logout)
            const [sessionActivity, setSessionActivity] = useState([]);
            const addSessionActivity = (action) => {
                setSessionActivity(prev => [{ action, time: new Date().toLocaleTimeString('he-IL', { hour:'2-digit', minute:'2-digit' }) }, ...prev].slice(0, 30));
            };

            // Splash (kept for animation after login)
            const [showSplash, setShowSplash] = useState(true);
            const [splashState, setSplashState] = useState('idle');

            // === V3.0: Profile System ===
            const [showProfileMenu, setShowProfileMenu] = useState(false);
            const [showProfileEditor, setShowProfileEditor] = useState(false);
            const profileMenuRef = React.useRef(null);

            // === V3.0: Phone Book, Warranty, Case4 ===
            const [showPhoneBook, setShowPhoneBook] = useState(false);
            const [showWarranty, setShowWarranty] = useState(false);
            const [phoneBookSearch, setPhoneBookSearch] = useState('');
            const [phoneBookTab, setPhoneBookTab] = useState(0);
            const phoneBookRef = React.useRef(null);
            const warrantyRef = React.useRef(null);

            // Profile data helpers (per-user in localStorage)
            const getProfileKey = (username) => `klar_profile_${username}`;
            const getProfile = (username) => {
                try { return JSON.parse(localStorage.getItem(getProfileKey(username)) || '{}'); } catch { return {}; }
            };
            const saveProfile = (username, data) => {
                try { localStorage.setItem(getProfileKey(username), JSON.stringify(data)); } catch {}
            };

            // Close profile menu on outside click
            useEffect(() => {
                const handler = (e) => {
                    if (profileMenuRef.current && !profileMenuRef.current.contains(e.target)) setShowProfileMenu(false);
                    if (phoneBookRef.current && !phoneBookRef.current.contains(e.target)) setShowPhoneBook(false);
                    if (warrantyRef.current && !warrantyRef.current.contains(e.target)) setShowWarranty(false);
                };
                document.addEventListener('mousedown', handler);
                return () => document.removeEventListener('mousedown', handler);
            }, []);

            // ═══ useEffect: Keyboard Shortcuts ═══
            useEffect(() => {
                const handler = (e) => {
                    const tag = e.target.tagName;
                    const isInput = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || e.target.isContentEditable;
                    if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveDraft(); showToast('💾 טיוטה נשמרה!'); return; }
                    if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'S') { e.preventDefault(); setShowSnippets(prev => !prev); return; }
                    if (e.key === 'Escape') { if (showSnippets) { setShowSnippets(false); return; } if (showPerformance) { setShowPerformance(false); return; } if (showShortcuts) { setShowShortcuts(false); return; } }
                    if (e.key === 'F1') { e.preventDefault(); setShowShortcuts(prev => !prev); return; }
                    if (isInput) return;
                    if ((e.ctrlKey || e.metaKey) && e.key >= '1' && e.key <= '9') {
                        e.preventDefault();
                        const tabMap = { '1': 'main', '2': 'assembly', '3': 'photos', '4': 'return', '5': 'quality', '6': 'credit', '7': 'check', '8': 'bank', '9': 'upholsterer' };
                        if (tabMap[e.key]) { setActiveTab(tabMap[e.key]); setIsFormatsOpen(false); }
                        return;
                    }
                    if ((e.ctrlKey || e.metaKey) && e.key === 't') { e.preventDefault(); if (slaTimerRunning) stopSlaTimer(); else startSlaTimer(''); return; }
                };
                document.addEventListener('keydown', handler);
                return () => document.removeEventListener('keydown', handler);
            }, [showSnippets, showPerformance, showShortcuts, slaTimerRunning, activeTab]);

            // ═══ useEffect: Auto-Save every 45 seconds ═══
            useEffect(() => {
                if (!currentUser) return;
                const iv = setInterval(() => { saveDraft(); setLastAutoSave(new Date()); }, 45000);
                return () => clearInterval(iv);
            }, [currentUser, activeTab]);

            // ═══ useEffect: SLA Timer tick ═══
            useEffect(() => {
                if (!slaTimerRunning) return;
                const iv = setInterval(() => { setSlaTimerElapsed(Math.floor((Date.now() - slaTimerStart) / 1000)); }, 1000);
                return () => clearInterval(iv);
            }, [slaTimerRunning, slaTimerStart]);

            // ═══ useEffect: Check for existing draft on login ═══
            useEffect(() => {
                if (currentUser) {
                    try {
                        const draft = JSON.parse(localStorage.getItem(DRAFTS_KEY));
                        if (draft && draft.savedAt) {
                            const age = Date.now() - new Date(draft.savedAt).getTime();
                            if (age < 86400000) { setHasDraft(true); setShowDraftBanner(true); }
                        }
                    } catch {}
                }
            }, [currentUser]);
            const ProfileEditorModal = ({ user, onClose }) => {
                const existing = getProfile(user.username);
                const [pName, setPName] = useState(existing.displayName || user.username);
                const [pEmail, setPEmail] = useState(existing.email || '');
                const [pPhone, setPPhone] = useState(existing.phone || '');
                const [pPhoto, setPPhoto] = useState(existing.photo || '');
                const [showPasswordSection, setShowPasswordSection] = useState(false);
                const [oldPass, setOldPass] = useState('');
                const [newPass, setNewPass] = useState('');
                const [confirmNewPass, setConfirmNewPass] = useState('');
                const [passError, setPassError] = useState('');
                const [passSuccess, setPassSuccess] = useState('');
                const fileInputRef = React.useRef(null);

                const handlePhotoUpload = (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    if (file.size > 500000) { showToast('⚠️ קובץ גדול מדי (מקסימום 500KB)'); return; }
                    const reader = new FileReader();
                    reader.onload = (ev) => setPPhoto(ev.target.result);
                    reader.readAsDataURL(file);
                };

                const handleSave = () => {
                    saveProfile(user.username, { displayName: pName, email: pEmail, phone: pPhone, photo: pPhoto });
                    showToast('✅ הפרופיל נשמר בהצלחה!');
                    onClose();
                };

                const handleChangePassword = () => {
                    setPassError(''); setPassSuccess('');
                    if (!oldPass || !newPass || !confirmNewPass) { setPassError('נא למלא את כל השדות'); return; }
                    const users = getUsers();
                    const u = users.find(x => x.username === user.username);
                    if (!u || u.passwordHash !== hashPassword(oldPass)) { setPassError('הסיסמה הנוכחית שגויה'); return; }
                    if (newPass.length < 4) { setPassError('סיסמה חדשה חייבת להכיל לפחות 4 תווים'); return; }
                    if (newPass !== confirmNewPass) { setPassError('הסיסמאות החדשות אינן תואמות'); return; }
                    u.passwordHash = hashPassword(newPass);
                    saveUsers(users);
                    setPassSuccess('✅ הסיסמה שונתה בהצלחה!');
                    setOldPass(''); setNewPass(''); setConfirmNewPass('');
                    setTimeout(() => setShowPasswordSection(false), 1500);
                };

            // Upload Excel/CSV to populate mapping
            const handleSupervisorFileUpload = async (e) => {

                try {

                    const lines = text.split('\n').filter(l => l.trim());
                    const updatedMapping = { ...assemblerSupervisors };
                    const updatedEmails = { ...supervisorEmails };

                        const parts = line.split(/[,\t;]/).map(p => p.trim().replace(/^"|"$/g, ''));
                        // Expected format: assemblerName, supervisorName, supervisorEmail (optional)
                        if (parts.length >= 2) {
                            const assemblerName = parts[0];
                            const supervisorName = parts[1];
                            const email = parts[2] || '';
                            if (assemblerName && supervisorName) {
                                updatedMapping[assemblerName] = supervisorName;
                                if (email) updatedEmails[supervisorName] = email;
                                count++;
                            }

                const furnitureKeywords = ['pax', 'malm', 'kivik', 'kallax', 'hemnes', 'bestå', 'poäng', 'ספה', 'מיטה', 'שידה', 'ארון', 'שולחן', 'כורסא', 'מזרן', 'ריהוט'];

            const extractMetadata = (text) => {
                let meta = { date: '', branch: '', register: '', receipt: '', total: '', customerName: '', phone: '', address: '', pniya: '', makat: '', time: '' };
                const dateMatch = text.match(/\b(\d{2}[/.-]\d{2}[/.-]\d{2,4})\b/);
                if (dateMatch) meta.date = dateMatch[1].replace(/\./g, '/'); 
                const branchMatch = text.match(/(נתניה|ראשל"צ|ראשון לציון|קרית אתא|באר שבע|אשתאול|פתח תקווה)/);
                if (branchMatch) meta.branch = branchMatch[1];
                const regMatch = text.match(/(?:קופה|מסוף)[:\s]*(\d+)/);
                if (regMatch) meta.register = regMatch[1];
                const recMatch = text.match(/(?:פתקית|חשבון)[:\s]*(\d+)/);
                if (recMatch) meta.receipt = recMatch[1];
                const totalMatch = text.match(/סה"כ.*?(\d+(?:,\d+)?\.\d{2})/);
                if (totalMatch) meta.total = totalMatch[1];
                // Extended extraction: customer name
                const nameMatch = text.match(/(?:שם[:\s]*|לקוח[:\s]*|שם הלקוח[:\s]*|שם לקוח[:\s]*)([א-ת\s]{2,30})/);
                if (nameMatch) meta.customerName = nameMatch[1].trim();
                // Phone
                const phoneMatch = text.match(/(?:טלפון[:\s]*|נייד[:\s]*|טל[:\s]*|פלא[:\s]*)?(0[2-9]\d[\s-]?\d{3}[\s-]?\d{4})/);
                if (phoneMatch) meta.phone = phoneMatch[1].replace(/\s/g, '');
                // Address
                const addressMatch = text.match(/(?:כתובת[:\s]*|רחוב[:\s]*)([א-ת0-9\s,.\-]{5,60})/);
                if (addressMatch) meta.address = addressMatch[1].trim();
                // Pniya number
                const pniyaMatch = text.match(/(?:פניי?ה|פנייה מס|מספר פנייה)[:\s#]*(\d{4,12})/);
                if (pniyaMatch) meta.pniya = pniyaMatch[1];
                // Time
                const timeMatch = text.match(/(?:שעה[:\s]*)?(\d{1,2}:\d{2})(?::\d{2})?/);
                if (timeMatch) meta.time = timeMatch[1];
                // First makat found (for camera form)
                const makatMatch = text.match(/(?<!\d)(\d{3})\.?(\d{3})\.?(\d{2})(?!\d)/);

                    makat: meta.makat || prev.makat
                }));

            const processPDFText = (fullText) => {
                const lines = fullText.split('\n');
                const extractedItems = [];
                const makatRegex = /(?<!\d)(\d{3})\.?(\d{3})\.?(\d{2})(?!\d)/;

                lines.forEach(line => {
                    const match = line.match(makatRegex);
                    if (match) {
                        const rawMakat = match[0].replace(/\./g, '');
                        let qty = 1; 
                        const numbersInLine = line.replace(match[0], '').match(/\b\d+\b/g);
                        if (numbersInLine && numbersInLine.length > 0) {
                            const potentialQty = parseInt(numbersInLine[0]);
                            if (potentialQty > 0 && potentialQty < 100) { qty = potentialQty; }
                        }
                        let price = 0;
                        const priceMatches = line.match(/\b\d+(?:,\d{3})*\.\d{2}\b/g);
                        if (priceMatches) {
                            const parsedPrices = priceMatches.map(p => parseFloat(p.replace(/,/g, '')));
                            if (parsedPrices.length >= 2) { price = parsedPrices[0]; } 
                            else if (parsedPrices.length === 1) { price = qty > 1 ? parsedPrices[0] / qty : parsedPrices[0]; }
                        }
                        let name = line.replace(match[0], '').replace(/\b\d+(\.\d{1,2})?\b/g, '').trim();
                        if (!name) name = "פריט איקאה (שם לא זוהה)";
                        extractedItems.push({ makat: rawMakat, name: name.substring(0, 40), quantity: qty, price: price });

                });
                return extractedItems;

            const currentTabItems = useMemo(() => {
                let items = tabData[activeTab] ? [...tabData[activeTab]] : [];

                if (sortOrder === 'original') return currentTabItems;
                return [...currentTabItems].sort((a, b) => {
                    const priceA = a.price || 0;
                    const priceB = b.price || 0;
                    if (sortOrder === 'priceDesc') return priceB - priceA;
                    if (sortOrder === 'priceAsc') return priceA - priceB;

            const splashScreenJSX = (() => {
                // Interactive particle canvas component
                const CanvasRef = React.useRef(null);
                const mouseRef = React.useRef({x: window.innerWidth/2, y: window.innerHeight/2});
                const particlesRef = React.useRef([]);
                const frameRef = React.useRef(null);

                React.useEffect(() => {
                    const canvas = CanvasRef.current;
                    if (!canvas) return;
                    const ctx = canvas.getContext('2d');
                    let W = canvas.width = window.innerWidth;
                    let H = canvas.height = window.innerHeight;

                    // Create particles
                    const NUM = 80;
                    const particles = [];
                    for (let i = 0; i < NUM; i++) {
                        particles.push({
                            x: Math.random()*W, y: Math.random()*H,
                            vx: (Math.random()-0.5)*0.8, vy: (Math.random()-0.5)*0.8,
                            r: Math.random()*3+1,
                            color: i%4===0 ? 'rgba(251,217,20,0.6)' : i%4===1 ? 'rgba(0,88,163,0.5)' : i%4===2 ? 'rgba(255,255,255,0.3)' : 'rgba(0,120,200,0.4)',
                            baseR: Math.random()*3+1,
                        });
                    }
                    particlesRef.current = particles;

                    const handleMouseMove = (e) => { mouseRef.current = {x: e.clientX, y: e.clientY}; };
                    window.addEventListener('mousemove', handleMouseMove);

                    const handleResize = () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; };
                    window.addEventListener('resize', handleResize);

                    const animate = () => {
                        ctx.clearRect(0,0,W,H);
                        const mx = mouseRef.current.x, my = mouseRef.current.y;

                        particles.forEach((p, i) => {
                            // Mouse attraction
                            const dx = mx - p.x, dy = my - p.y;
                            const dist = Math.sqrt(dx*dx+dy*dy);
                            if (dist < 200) {
                                const force = (200-dist)/200 * 0.02;
                                p.vx += dx * force;
                                p.vy += dy * force;
                                p.r = p.baseR + (200-dist)/200 * 4;
                            } else {
                                p.r += (p.baseR - p.r) * 0.05;
                            }

                            p.vx *= 0.98; p.vy *= 0.98;
                            p.x += p.vx; p.y += p.vy;
                            if (p.x<0) p.x=W; if (p.x>W) p.x=0;
                            if (p.y<0) p.y=H; if (p.y>H) p.y=0;

                            ctx.beginPath();
                            ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                            ctx.fillStyle = p.color;
                            ctx.fill();

                            // Draw connections
                            for (let j = i+1; j < particles.length; j++) {
                                const p2 = particles[j];
                                const d = Math.sqrt((p.x-p2.x)**2+(p.y-p2.y)**2);
                                if (d < 120) {
                                    ctx.beginPath();
                                    ctx.moveTo(p.x, p.y);
                                    ctx.lineTo(p2.x, p2.y);
                                    ctx.strokeStyle = `rgba(0,88,163,${(120-d)/120*0.15})`;
                                    ctx.lineWidth = 0.5;
                                    ctx.stroke();
                                }
                            }
                        });

                        // Mouse glow
                        const grd = ctx.createRadialGradient(mx,my,0,mx,my,150);
                        grd.addColorStop(0, 'rgba(251,217,20,0.08)');
                        grd.addColorStop(0.5, 'rgba(0,88,163,0.04)');
                        grd.addColorStop(1, 'rgba(0,0,0,0)');
                        ctx.fillStyle = grd;
                        ctx.fillRect(0,0,W,H);

                        frameRef.current = requestAnimationFrame(animate);
                    };
                    animate();

                    return () => {
                        window.removeEventListener('mousemove', handleMouseMove);
                        window.removeEventListener('resize', handleResize);
                        if (frameRef.current) cancelAnimationFrame(frameRef.current);
                    };
                }, []);

                        <div style={{position:'absolute',bottom:'-20%',left:'-15%',width:'600px',height:'600px',borderRadius:'50%',background:'radial-gradient(circle,rgba(0,88,163,0.15) 0%,transparent 70%)',animation:'floatOrb 15s ease-in-out infinite reverse',zIndex:0}} />
                        <div style={{position:'absolute',top:'40%',left:'60%',width:'300px',height:'300px',borderRadius:'50%',background:'radial-gradient(circle,rgba(255,255,255,0.05) 0%,transparent 70%)',animation:'floatOrb 8s ease-in-out infinite',animationDelay:'3s',zIndex:0}} />

                        <h2 className="mt-8 text-2xl md:text-3xl font-black text-white tracking-wide text-center px-4 relative z-10" style={{textShadow:'0 2px 20px rgba(0,88,163,0.5),0 0 40px rgba(251,217,20,0.15)', animation:'loginSlideUp 0.6s ease-out'}}>מערכת KLAR למחלקת שירות לקוחות</h2>
                        <p className="mt-3 text-blue-200 font-medium text-center px-4 mb-2 relative z-10" style={{animation:'loginSlideUp 0.8s ease-out'}}>סורק קבלות, חישוב פיצויי הרכבה ומלאי בזמן אמת</p>

            const COLORS = ['#0058a3','#ffdb00','#00b294','#ff6b35','#6264A7','#038387','#0066FF','#e74c3c','#2ecc71'];

            const hist = getHistory();
            const total = hist.length;

            // By tab
            const byTab = {};
            hist.forEach(e => { byTab[e.tab] = (byTab[e.tab]||0) + 1; });
            const tabEntries = Object.entries(byTab).sort((a,b)=>b[1]-a[1]);

            // By agent
            const byAgent = {};
            hist.forEach(e => { if(e.agent) byAgent[e.agent] = (byAgent[e.agent]||0) + 1; });
            const agentEntries = Object.entries(byAgent).sort((a,b)=>b[1]-a[1]).slice(0,8);

            // By day (last 14 days)
            const dayMap = {};
            for(let i=13;i>=0;i--){
                const d = new Date(); d.setDate(d.getDate()-i);
                const key = d.toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit'});
                dayMap[key] = 0;
            }
            hist.forEach(e => {
                try {
                    const key = new Date(e.savedAt).toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit'});
                    if(dayMap[key]!==undefined) dayMap[key]++;
                } catch {}
            });
            const dayEntries = Object.entries(dayMap);
            const maxDay = Math.max(...dayEntries.map(d=>d[1]),1);

            // This week vs last week
            const now = Date.now();
            const weekMs = 7*24*3600*1000;
            const thisWeek = hist.filter(e=>now-new Date(e.savedAt).getTime()<weekMs).length;
            const lastWeek = hist.filter(e=>{const age=now-new Date(e.savedAt).getTime();return age>=weekMs&&age<2*weekMs;}).length;
            const weekDelta = lastWeek>0 ? Math.round((thisWeek-lastWeek)/lastWeek*100) : (thisWeek>0?100:0);

            // Today
            const todayStart = new Date(); todayStart.setHours(0,0,0,0);
            const today = hist.filter(e=>new Date(e.savedAt)>=todayStart).length;

            // Avg per day (last 14 days with data)
            const daysWithData = dayEntries.filter(d=>d[1]>0).length||1;
            const avgPerDay = Math.round(thisWeek/7*10)/10;

            return (

                            סטטיסטיקות פניות

                            { label: 'היום',         value: today,     icon: '📅', color: 'bg-green-50 border-green-200 text-green-700' },
                            { label: 'השבוע',        value: thisWeek,  icon: '📆', color: 'bg-purple-50 border-purple-200 text-purple-700' },
                            { label: 'ממוצע יומי',   value: avgPerDay, icon: '📊', color: 'bg-amber-50 border-amber-200 text-amber-700' },
                        ].map(({label,value,icon,color}) => (
                            <div key={label} className={`${color} border rounded-xl p-4 text-center`}>
                                <div className="text-2xl mb-1">{icon}</div>
                                <div className="text-2xl font-black">{value}</div>
                                <div className="text-xs font-bold mt-0.5 opacity-70">{label}</div>
                                {label==='השבוע' && lastWeek>0 && (
                                    <div className={`text-xs font-bold mt-1 ${weekDelta>=0?'text-green-600':'text-red-500'}`}>
                                        {weekDelta>=0?'↑':'↓'}{Math.abs(weekDelta)}% vs שבוע קודם
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>

                    {/* Activity bar chart — last 14 days */}
                    {total > 0 && (
                        <div className="bg-white border border-gray-200 rounded-xl p-4">
                            <h3 className="font-black text-gray-700 text-sm mb-4">פעילות 14 ימים אחרונים</h3>
                            <div className="flex items-end gap-1 h-28">
                                {dayEntries.map(([day,count],i)=>(
                                    <div key={day} className="flex flex-col items-center flex-1 gap-1">
                                        <div className="text-[9px] font-bold text-gray-500">{count>0?count:''}</div>
                                        <div
                                            className="w-full rounded-sm transition-all"
                                            style={{
                                                height: `${Math.max((count/maxDay)*80,count>0?8:2)}px`,
                                                background: count>0 ? '#0058a3' : '#e5e7eb'
                                            }}
                                        />
                                        <div className="text-[8px] text-gray-400 rotate-45 origin-top-left translate-y-2 whitespace-nowrap">{day}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* By tab + By agent side by side */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {/* By tab */}
                        <div className="bg-white border border-gray-200 rounded-xl p-4">
                            <h3 className="font-black text-gray-700 text-sm mb-3">חלוקה לפי טאב</h3>
                            {tabEntries.length===0 ? <p className="text-xs text-gray-400">אין נתונים</p> :
                                <div className="flex flex-col gap-2">
                                    {tabEntries.map(([tab,count],i)=>(
                                        <div key={tab} className="flex items-center gap-2">
                                            <div className="text-xs font-bold text-gray-600 w-28 truncate text-right">{TAB_LABELS[tab]||tab}</div>
                                            <div className="flex-1 h-4 bg-gray-100 rounded-full overflow-hidden">
                                                <div className="h-full rounded-full transition-all" style={{width:`${Math.round(count/total*100)}%`, background:COLORS[i%COLORS.length]}} />
                                            </div>
                                            <div className="text-xs font-black text-gray-700 w-6 text-left">{count}</div>
                                        </div>
                                    ))}
                                </div>
                            }
                        </div>
                        {/* By agent */}
                        <div className="bg-white border border-gray-200 rounded-xl p-4">
                            <h3 className="font-black text-gray-700 text-sm mb-3">חלוקה לפי נציג</h3>

                    </div>

                    {/* Results */}

                            <p className="mt-3 font-bold text-lg">אין פניות שמורות</p>

                        <div className="flex flex-col gap-3">
                            {results.map(entry => (
                                <div key={entry.id} className="bg-white border border-gray-200 rounded-xl p-4 hover:border-ikea-blue hover:shadow-sm transition-all">
                                    <div className="flex items-start justify-between gap-2 flex-wrap">
                                        <div className="flex items-center gap-2 flex-wrap">
                                            <span className="text-xs font-bold bg-ikea-blue text-white px-2 py-0.5 rounded-full">
                                                {TAB_LABELS[entry.tab] || entry.tab}

                                            {entry.pniya && (
                                                <span className="text-xs font-mono font-bold text-gray-600 bg-gray-100 px-2 py-0.5 rounded">
                                                    #{entry.pniya}

                                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
                                            </button>
                                        </div>
                                    </div>
                                    <div className="mt-2 flex flex-wrap gap-x-4 gap-y-1 text-xs text-gray-500">
                                        {entry.phone && <span>📞 {entry.phone}</span>}
                                        {entry.branch && <span>🏪 {entry.branch}</span>}
                                        {entry.agent && <span>👤 {entry.agent}</span>}

                                        <p className="mt-2 text-xs text-gray-500 italic line-clamp-2">{entry.summary}</p>
                                    )}

            );
        }

        // ============================================================
